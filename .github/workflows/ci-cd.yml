name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/backend/package-lock.json

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./apps/backend
        run: pnpm install --frozen-lockfile

      - name: Setup environment
        working-directory: ./apps/backend
        run: |
          echo "DATABASE_URL=postgresql://test:test@localhost:5432/test_db" >> .env
          echo "DIRECT_URL=postgresql://test:test@localhost:5432/test_db" >> .env
          echo "JWT_SECRET=test-secret-key" >> .env
          echo "NODE_ENV=test" >> .env

      - name: Generate Prisma Client
        working-directory: ./apps/backend
        run: pnpm prisma generate

      - name: Sync database schema
        working-directory: ./apps/backend
        run: pnpm prisma db push

      - name: Run unit tests
        working-directory: ./apps/backend
        run: pnpm test

      - name: Run e2e tests
        working-directory: ./apps/backend
        run: pnpm test:e2e

      - name: Build application
        working-directory: ./apps/backend
        run: pnpm build

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/zalo-mini-app/package-lock.json

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        working-directory: ./apps/zalo-mini-app
        run: pnpm install --frozen-lockfile

      - name: Run linter
        working-directory: ./apps/zalo-mini-app
        run: pnpm lint

      - name: Build application
        working-directory: ./apps/zalo-mini-app
        run: pnpm build

  build-and-push:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-backend:latest
          cache-to: type=inline

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/zalo-mini-app
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/zalo-ecommerce-frontend:latest
          cache-to: type=inline

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/zalo-ecommerce
            docker-compose pull
            docker-compose up -d
            docker system prune -f
